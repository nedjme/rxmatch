name: Build Windows

on:
  workflow_dispatch:        # trigger manually from the Actions tab
  push:
    tags:
      - 'v*'               # or automatically on version tags

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run tauri build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_AI_API_KEY: ${{ secrets.VITE_GOOGLE_AI_API_KEY }}
          VITE_ADMIN_EMAIL: ${{ secrets.VITE_ADMIN_EMAIL }}
          # Optional: override default model (gemini-2.0-flash)
          VITE_GOOGLE_MODEL: ${{ secrets.VITE_GOOGLE_MODEL }}
          VITE_GOOGLE_ESCALATION_MODEL: ${{ secrets.VITE_GOOGLE_ESCALATION_MODEL }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: RxMatch-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
